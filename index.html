<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVER GAY - Mobile Edition</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background-color: #ffb6c1; font-family: 'Arial Black', sans-serif; gap: 10px; overflow-x: hidden;
        }

        .cabecera { position: relative; display: flex; align-items: center; justify-content: center; height: 180px; width: 100%; }
        .foto-fondo {
            position: absolute; width: 150px; height: 150px; object-fit: cover; z-index: 1; opacity: 0.8;
            clip-path: path('M75,22 C75,22 67,0 41,0 C18,0 0,18 0,41 C0,75 33,97 75,135 C116,97 150,75 150,41 C150,18 131,0 108,0 C82,0 75,22 75,22 Z');
            transform: scale(1.15);
        }

        h1 {
            font-size: 30px; text-transform: uppercase; text-align: center; position: relative; z-index: 2;
            background: linear-gradient(to bottom, #ffffff 0%, #ff00ff 50%, #8b00ff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0;
            filter: drop-shadow(3px 3px 0px #000); letter-spacing: -1px;
            animation: parpadeo 0.8s steps(2, start) infinite;
        }
        @keyframes parpadeo { to { visibility: hidden; } }

        #game-container {
            position: relative; width: 95%; max-width: 600px; height: 220px;
            background-color: rgba(255, 255, 255, 0.3); border-bottom: 4px solid #d14789; border-radius: 15px;
        }
        canvas { width: 100%; height: 100%; display: block; }

        .ui-panel { width: 95%; max-width: 600px; text-align: center; background: rgba(255,255,255,0.5); padding: 10px; border-radius: 10px; }
        input { padding: 8px; border-radius: 5px; border: 2px solid #d14789; width: 80%; margin-bottom: 10px; font-weight: bold; text-align: center; }
        
        .leaderboard { width: 100%; background: #fff; border-radius: 8px; padding: 10px; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .score-entry { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #eee; color: #d14789; }
    </style>
</head>
<body>

    <div class="cabecera">
        <img src="perro.png" alt="Fondo" class="foto-fondo">
        <h1>EVER GAY EL VIDEOJUEGO</h1>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="220"></canvas>
    </div>

    <div class="ui-panel">
        <input type="text" id="nickname" placeholder="PON TU APODO AQUÍ">
        <div class="leaderboard">
            <strong style="color: #8b00ff;">TOP 5 CHOLOS</strong>
            <div id="scoreList"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const nickInput = document.getElementById("nickname");
        const scoreList = document.getElementById("scoreList");

        nickInput.value = localStorage.getItem("everGayNick") || "";
        nickInput.addEventListener("input", () => localStorage.setItem("everGayNick", nickInput.value));

        let player = { x: 50, y: 160, w: 40, h: 60, dy: 0, jumpForce: 14, gravity: 0.7, grounded: true };
        let obstacles = [];
        let score = 0;
        let gameActive = true;
        let musicStarted = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playNote(freq, start, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(0.1, start);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(start); osc.stop(start + duration);
        }

        function playMario() {
            if (!gameActive) return;
            const now = audioCtx.currentTime;
            const m = [329.63, 329.63, 0, 329.63, 0, 261.63, 329.63, 0, 392.00, 0, 0, 0, 196.00];
            m.forEach((f, i) => { if(f > 0) playNote(f, now + i * 0.13, 0.15); });
            setTimeout(playMario, 2000);
        }

        function saveScore() {
            let scores = JSON.parse(localStorage.getItem("everGayScores") || "[]");
            scores.push({ name: nickInput.value || "Anónimo", pts: score });
            scores.sort((a, b) => b.pts - a.pts);
            localStorage.setItem("everGayScores", JSON.stringify(scores.slice(0, 5)));
            displayScores();
        }

        function displayScores() {
            let scores = JSON.parse(localStorage.getItem("everGayScores") || "[]");
            scoreList.innerHTML = scores.map(s => `<div class="score-entry"><span>${s.name}</span><span>${s.pts}</span></div>`).join("");
        }
        displayScores();

        // FIGURAS ORIGINALES
        function drawCharacter(x, y) {
            ctx.fillStyle = "#3d2b1f";
            ctx.beginPath(); ctx.arc(x + 20, y - 5, 9, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(x + 16, y - 5, 3, 0, Math.PI * 2); ctx.arc(x + 24, y - 5, 3, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = "#0000FF";
            ctx.beginPath(); ctx.ellipse(x + 20, y + 22, 20, 25, 0, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#3d2b1f"; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(x + 2, y + 15); ctx.lineTo(x - 8, y + 30);
            ctx.moveTo(x + 38, y + 15); ctx.lineTo(x + 48, y + 30);
            ctx.moveTo(x + 12, y + 45); ctx.lineTo(x + 8, y + 60);
            ctx.moveTo(x + 28, y + 45); ctx.lineTo(x + 32, y + 60); ctx.stroke();
        }

        function drawObstacle(x, y) {
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(x-10, y+40, 14, 0, Math.PI*2); ctx.arc(x+10, y+40, 14, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); if(ctx.roundRect) ctx.roundRect(x-8, y+5, 16, 40, 5); else ctx.rect(x-8, y+5, 16, 40); ctx.fill();
            ctx.beginPath(); ctx.ellipse(x, y+5, 11, 8, 0, 0, Math.PI*2); ctx.fill();
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!player.grounded) { player.dy += player.gravity; player.y += player.dy; }
            if (player.y >= 160) { player.y = 160; player.grounded = true; }
            
            drawCharacter(player.x, player.y);

            if (Math.random() < 0.015) obstacles.push({ x: canvas.width + 50, y: 160 });
            
            obstacles.forEach((obs, index) => {
                obs.x -= 7;
                drawObstacle(obs.x, obs.y);
                if (player.x + 30 > obs.x - 15 && player.x < obs.x + 15 && player.y + 45 > obs.y) {
                    gameActive = false;
                    saveScore();
                    setTimeout(() => location.reload(), 2000);
                }
                if (obs.x + 30 < 0) { obstacles.splice(index, 1); score++; }
            });

            ctx.fillStyle = "#d14789"; ctx.font = "20px Arial";
            ctx.fillText("Score: " + score, 480, 40);
            requestAnimationFrame(update);
        }

        const jump = (e) => {
            if (e) e.preventDefault();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!musicStarted) { playMario(); musicStarted = true; }
            if (player.grounded && gameActive) { player.dy = -player.jumpForce; player.grounded = false; }
        };

        window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
        canvas.addEventListener("touchstart", jump, {passive: false});
        canvas.addEventListener("mousedown", jump);
        update();
    </script>
</body>
</html>
