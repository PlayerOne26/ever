<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVER GAY - Mario Experience</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body {
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background-color: #ffb6c1; font-family: 'Arial Black', sans-serif; overflow-x: hidden; padding: 10px;
        }
        .cabecera { position: relative; display: flex; align-items: center; justify-content: center; height: 180px; width: 100%; margin-bottom: 10px; }
        .foto-fondo {
            position: absolute; width: 140px; height: 140px; object-fit: cover; z-index: 1; opacity: 0.8;
            clip-path: path('M70,21 C70,21 63,0 38.5,0 C17.5,0 0,17.5 0,38.5 C0,70 31.5,91 70,126 C108.5,91 140,70 140,38.5 C140,17.5 122.5,0 101.5,0 C77,0 70,21 70,21 Z');
            transform: scale(1.2); background: #ff00ff;
        }
        h1 {
            font-size: clamp(24px, 8vw, 45px); text-transform: uppercase; text-align: center; position: relative; z-index: 2;
            background: linear-gradient(to bottom, #ffffff 0%, #ff00ff 50%, #8b00ff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0;
            filter: drop-shadow(3px 3px 0px #000); animation: parpadeo 0.8s steps(2, start) infinite;
        }
        @keyframes parpadeo { to { visibility: hidden; } }
        #game-container {
            position: relative; width: 100%; max-width: 600px; height: 200px;
            background-color: rgba(255, 255, 255, 0.3); border-bottom: 4px solid #d14789; border-radius: 15px; overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }
        .ui-panel { width: 100%; max-width: 600px; text-align: center; margin-top: 10px; }
        input { padding: 8px; border-radius: 5px; border: 2px solid #d14789; width: 80%; margin-bottom: 10px; font-weight: bold; text-align: center; }
        .leaderboard { background: #fff; border-radius: 8px; padding: 10px; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .score-entry { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #eee; color: #d14789; }
    </style>
</head>
<body>

    <div class="cabecera">
        <img src="perro.png" alt="" class="foto-fondo">
        <h1>EVER GAY EL VIDEOJUEGO</h1>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="200"></canvas>
    </div>

    <div class="ui-panel">
        <input type="text" id="nickname" placeholder="PON TU NOMBRE">
        <div class="leaderboard">
            <strong style="color: #8b00ff;">TOP CHOLOS</strong>
            <div id="scoreList"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const nickInput = document.getElementById("nickname");
        const scoreList = document.getElementById("scoreList");

        nickInput.value = localStorage.getItem("everGayNick") || "";
        nickInput.addEventListener("input", () => localStorage.setItem("everGayNick", nickInput.value));

        let player = { x: 50, y: 140, dy: 0, jumpForce: 12, gravity: 0.6, grounded: true, invincible: false };
        let obstacles = [], items = [], score = 0, gameActive = true, musicStarted = false;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-MX'; u.pitch = 2.0; u.rate = 1.4;
            window.speechSynthesis.speak(u);
        }

        function playMario() {
            if (!gameActive) return;
            const now = audioCtx.currentTime;
            const m = [329.63, 329.63, 0, 329.63, 0, 261.63, 329.63, 0, 392.00];
            m.forEach((f, i) => { if(f > 0) {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(f, now + i*0.13);
                g.gain.setValueAtTime(0.05, now + i*0.13);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(now + i*0.13); osc.stop(now + i*0.13 + 0.1);
            }});
            setTimeout(playMario, 2000);
        }

        function saveScore() {
            let s = JSON.parse(localStorage.getItem("everGayScores") || "[]");
            s.push({ name: nickInput.value || "Anónimo", pts: score });
            s.sort((a, b) => b.pts - a.pts);
            localStorage.setItem("everGayScores", JSON.stringify(s.slice(0, 5)));
            displayScores();
        }

        function displayScores() {
            let s = JSON.parse(localStorage.getItem("everGayScores") || "[]");
            scoreList.innerHTML = s.map(x => `<div class="score-entry"><span>${x.name}</span><span>${x.pts}</span></div>`).join("");
        }
        displayScores();

        function drawCharacter(x, y) {
            ctx.fillStyle = player.invincible ? "#FFD700" : "#3d2b1f";
            ctx.beginPath(); ctx.arc(x + 20, y - 5, 9, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = player.invincible ? "white" : "#0000FF";
            ctx.beginPath(); ctx.ellipse(x + 20, y + 22, 18, 22, 0, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#3d2b1f"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(x + 5, y + 15); ctx.lineTo(x - 5, y + 30);
            ctx.moveTo(x + 35, y + 15); ctx.lineTo(x + 45, y + 30);
            ctx.moveTo(x + 12, y + 42); ctx.lineTo(x + 8, y + 55);
            ctx.moveTo(x + 28, y + 42); ctx.lineTo(x + 32, y + 55); ctx.stroke();
        }

        function drawBeer(x, y) {
            ctx.fillStyle = "#FFD700"; ctx.fillRect(x, y, 15, 25);
            ctx.fillStyle = "#8B4513"; ctx.fillRect(x+4, y-8, 7, 8);
            ctx.fillStyle = "white"; ctx.fillRect(x, y, 15, 5);
        }

        function drawObstacle(x, y) {
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(x-8, y+35, 12, 0, Math.PI*2); ctx.arc(x+8, y+35, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillRect(x-6, y+5, 12, 35);
            ctx.beginPath(); ctx.ellipse(x, y+5, 10, 7, 0, 0, Math.PI*2); ctx.fill();
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!player.grounded) { player.dy += player.gravity; player.y += player.dy; }
            if (player.y >= 140) { player.y = 140; player.grounded = true; }

            if (Math.random() < 0.015) obstacles.push({ x: canvas.width + 50, y: 140 });
            if (Math.random() < 0.005) items.push({ x: canvas.width + 50, y: 100 });

            items.forEach((it, i) => {
                it.x -= 6; drawBeer(it.x, it.y);
                if (player.x < it.x + 20 && player.x + 40 > it.x && player.y < it.y + 30) {
                    items.splice(i, 1); player.invincible = true;
                    setTimeout(() => player.invincible = false, 5000);
                }
            });

            obstacles.forEach((obs, index) => {
                obs.x -= 7; drawObstacle(obs.x, obs.y);
                if (player.x + 25 > obs.x - 10 && player.x < obs.x + 10 && player.y + 40 > obs.y) {
                    if (!player.invincible) {
                        gameActive = false; speak("hay que ricooo");
                        saveScore(); setTimeout(() => location.reload(), 2000);
                    }
                }
                if (obs.x + 30 < 0) { obstacles.splice(index, 1); score++; }
            });

            drawCharacter(player.x, player.y);
            ctx.fillStyle = "#d14789"; ctx.font = "bold 18px Arial";
            ctx.fillText("Puntos: " + score, 480, 30);
            if(player.invincible) ctx.fillText("¡MODO BORRACHO!", 20, 30);
            requestAnimationFrame(update);
        }

        const jump = (e) => {
            if(e) e.preventDefault();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!musicStarted) { playMario(); musicStarted = true; }
            if (player.grounded && gameActive) { 
                player.dy = -player.jumpForce; player.grounded = false; 
                speak("hay");
            }
        };

        window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
        document.getElementById("game-container").addEventListener("touchstart", jump);
        document.getElementById("game-container").addEventListener("mousedown", jump);
        update();
    </script>
</body>
</html>
