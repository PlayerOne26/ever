<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVER GAY TURBO MOBILE</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; background-color: #000;
            font-family: 'Arial Black', sans-serif; color: white;
            overflow-x: hidden;
        }

        .cabecera { position: relative; height: 120px; width: 100%; display: flex; justify-content: center; align-items: center; }
        .foto-fondo {
            position: absolute; width: 100px; height: 100px; opacity: 0.5;
            clip-path: path('M50,15 C50,15 45,0 27,0 C12,0 0,12 0,27 C0,50 22,65 50,90 C77,65 100,50 100,27 C100,12 87,0 72,0 C55,0 50,15 50,15 Z');
            background: #ff00ff; z-index: 1;
        }
        h1 { font-size: 24px; z-index: 2; background: linear-gradient(#00f2ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }

        #game-container {
            position: relative; width: 100%; max-width: 600px; height: 200px;
            background: #050505; border-bottom: 3px solid #ff00ff; border-radius: 10px;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }

        .ui-panel { width: 100%; max-width: 600px; margin-top: 15px; text-align: center; }
        input { padding: 10px; border-radius: 5px; border: none; width: 70%; margin-bottom: 10px; font-weight: bold; }
        
        .leaderboard {
            width: 100%; background: #111; border: 1px solid #333; border-radius: 8px;
            margin-top: 15px; padding: 10px; font-size: 14px;
        }
        .leaderboard h3 { color: #00f2ff; margin: 0 0 10px 0; font-size: 16px; }
        .score-entry { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div class="cabecera">
        <div class="foto-fondo"></div>
        <h1>EVER GAY TURBO</h1>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="200"></canvas>
    </div>

    <div class="ui-panel">
        <input type="text" id="nickname" placeholder="TU APODO CHOLO" maxlength="12">
        <p style="font-size: 12px; color: #ff00ff;">TOCA LA PANTALLA PARA SALTAR</p>
        
        <div class="leaderboard">
            <h3>TABLA DE LEYENDAS</h3>
            <div id="scoreList"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const nickInput = document.getElementById("nickname");
        const scoreList = document.getElementById("scoreList");

        // Cargar nombre guardado
        nickInput.value = localStorage.getItem("everGayNick") || "";
        nickInput.addEventListener("change", () => localStorage.setItem("everGayNick", nickInput.value));

        let gameActive = true;
        let score = 0;
        let gameSpeed = 8;
        let obstacles = [];
        let player = { x: 50, y: 140, w: 40, h: 60, dy: 0, jumpForce: 15, gravity: 0.9, grounded: true };

        // --- AUDIO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let musicStarted = false;

        function playNote(freq, start, duration, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(vol, start);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(start); osc.stop(start + duration);
        }

        function playCumbia() {
            if (!gameActive) return;
            const now = audioCtx.currentTime;
            [329, 329, 0, 329].forEach((f, i) => { if(f>0) playNote(f, now + i*0.12, 0.1, 0.1); });
            setTimeout(playCumbia, 1500);
        }

        // --- LÓGICA TABLA ---
        function updateLeaderboard() {
            let scores = JSON.parse(localStorage.getItem("everGayScores") || "[]");
            if (score > 0) {
                scores.push({ name: nickInput.value || "Anonimo", pts: score });
                scores.sort((a, b) => b.pts - a.pts);
                scores = scores.slice(0, 5); // Solo top 5
                localStorage.setItem("everGayScores", JSON.stringify(scores));
            }
            scoreList.innerHTML = scores.map(s => `<div class="score-entry"><span>${s.name}</span><span>${s.pts}</span></div>`).join("");
        }
        updateLeaderboard();

        // --- DIBUJO ---
        function draw() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Fondo
            ctx.fillStyle = "rgba(40,40,40,0.3)";
            ctx.font = "bold 30px serif"; ctx.textAlign = "center";
            ctx.fillText("flaco deja el criko", 300, 100);

            // Jugador
            if (!player.grounded) { player.dy += player.gravity; player.y += player.dy; }
            if (player.y >= 140) { player.y = 140; player.grounded = true; }
            
            ctx.fillStyle = "#00f2ff";
            ctx.shadowBlur = 10; ctx.shadowColor = "#00f2ff";
            ctx.fillRect(player.x, player.y, 30, 40); // Simplificado para móvil
            ctx.shadowBlur = 0;

            // Obstáculos
            if (Math.random() < 0.02) obstacles.push({ x: 600, y: 140 });
            obstacles.forEach((o, i) => {
                o.x -= gameSpeed;
                ctx.fillStyle = "#ff00ff";
                ctx.fillRect(o.x, o.y + 10, 20, 30);

                if (player.x < o.x + 20 && player.x + 30 > o.x && player.y + 40 > o.y) {
                    gameActive = false;
                    updateLeaderboard();
                    setTimeout(() => location.reload(), 2000);
                }
            });
            obstacles = obstacles.filter(o => o.x > -20);

            ctx.fillStyle = "white"; ctx.font = "20px Arial"; ctx.textAlign = "left";
            ctx.fillText("PTS: " + score++, 20, 30);
            requestAnimationFrame(draw);
        }

        const jump = () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!musicStarted) { playCumbia(); musicStarted = true; }
            if (player.grounded && gameActive) { player.dy = -player.jumpForce; player.grounded = false; }
        };

        window.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); }, {passive: false});
        window.addEventListener("mousedown", jump);
        draw();
    </script>
</body>
</html>
